name = "shopee-product-research-queue-consumer"
main = "src/index.ts"
compatibility_date = "2026-06-17"
compatibility_flags = ["nodejs_compat"]
account_id = "79dea2845a4b62ea5229c8676dea02c0"

[vars]
APP_ENV = "production"
APP_NAME = "Shopee Product Research AI"

# Runtime configuration (9router base URL, Browser Run base URL, models, scoring, etc.) must be configured in D1 config tables and edited from the admin UI. Secrets are set via: wrangler secret put <NAME>
# - NINEROUTER_API_KEY (D1 secretRef)
# - BROWSER_RUN_API_KEY (D1 secretRef)

[[d1_databases]]
binding = "DB"
database_name = "multi_Ai_db"
database_id = "b80ca989-6771-427f-a656-c7ab6ffc17ce"

[[r2_buckets]]
binding = "LOGS"
bucket_name = "multi-apps-ai-bucket"

[[queues.consumers]]
queue = "shopee-research-queue"
max_batch_size = 10
max_batch_timeout = 30
max_retries = 3
dead_letter_queue = "shopee-research-dlq"
